services:
  postgres:
    image: postgres:16
    container_name: parkease-postgres
    environment:
      POSTGRES_USER: parkease
      POSTGRES_PASSWORD: parkease123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: parkease-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    container_name: parkease-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data: