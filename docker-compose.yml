version: '3.9'

services:
  mysql:
    image: mysql:8
    container_name: parkease-mysql
    environment:
      MYSQL_ROOT_PASSWORD: parkease
      MYSQL_DATABASE: parkease_auth
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: parkease-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    container_name: parkease-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data: